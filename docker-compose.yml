version: '3.8'
services:
  wa-next:
    build:
      context: ./next-monitor-ui
      dockerfile: Dockerfile
    container_name: wa-next
    ports:
      - "3000:3000"
    env_file:
      - ./next-monitor-ui/.env.local
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      retries: 3